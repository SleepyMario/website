<section class="widget archives">
    <div class="widget-icon">
        {{ partial "helper/icon" "infinity" }}
    </div>

    <h2 class="widget-title section-title">Page views</h2>

    <div class="widget-archive--list">
        <div class="archives-year">
            <a href="javascript:void(0)" style="cursor: default;">
                <span class="year">Since June 29, 2026</span>
                <span class="count" id="visitor-count">...</span>
            </a>
        </div>
    </div>
</section>

<script>
(() => {
    const output = document.getElementById("visitor-count");

    if (!output) {
        return;
    }

    fetch("/api/visitor-count", {
        cache: "no-store",
        credentials: "same-origin"
    })
        .then(response => {
            if (!response.ok) {
                throw new Error("Counter request failed");
            }

            return response.json();
        })
        .then(data => {
            output.textContent = Number(data.count).toLocaleString();
        })
        .catch(() => {
            output.textContent = "Unavailable";
        });
})();
</script>
